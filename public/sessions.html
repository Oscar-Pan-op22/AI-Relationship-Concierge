<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>同频 · 所有会话</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="page-shell">
      <header class="hero">
        <div class="hero-copy">
          <p class="eyebrow">同频 · 所有会话</p>
          <h1>查看所有正在进行和历史会话</h1>
          <p class="hero-text">这里会汇总你和其他用户之间所有已创建的预沟通会话，方便从统一入口继续查看和处理。</p>
        </div>
        <div class="hero-panel">
          <div class="metric">
            <span class="metric-label">当前登录</span>
            <strong data-current-user>正在加载...</strong>
          </div>
          <nav class="nav-links">
            <a class="secondary-button link-button" href="/">我的 Twin</a>
            <a class="secondary-button link-button" href="/matches.html">双边匹配</a>
            <a class="secondary-button link-button" href="/sessions.html">所有会话</a>
            <a class="secondary-button link-button" href="/inbox.html">待办箱</a>
            <button id="logout-button" class="secondary-button" type="button">退出登录</button>
          </nav>
        </div>
      </header>

      <main class="single-column">
        <section class="panel report-shell">
          <div class="panel-head">
            <h2>会话列表</h2>
            <p id="sessions-status" class="status-text">正在加载会话...</p>
          </div>
          <div id="sessions-list" class="stack-list"></div>
        </section>
      </main>
    </div>

    <script type="module" src="/sessions.js"></script>
  </body>
</html>
