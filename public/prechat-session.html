<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>同频 · 预沟通会话</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="page-shell">
      <header class="hero">
        <div class="hero-copy">
          <p class="eyebrow">同频 · 预沟通会话</p>
          <h1>Twin-Twin 线程与阶段报告</h1>
          <p id="session-hero-text" class="hero-text">正在加载会话内容...</p>
        </div>
        <div class="hero-panel">
          <div class="metric">
            <span class="metric-label">当前登录</span>
            <strong data-current-user>正在加载...</strong>
          </div>
          <nav class="nav-links">
            <a class="secondary-button link-button" href="/">我的 Twin</a>
            <a class="secondary-button link-button" href="/matches.html">双边匹配</a>
            <a class="secondary-button link-button" href="/inbox.html">待办箱</a>
            <button id="logout-button" class="secondary-button" type="button">退出登录</button>
          </nav>
        </div>
      </header>

      <main class="single-column">
        <section class="panel report-shell">
          <div class="panel-head">
            <h2>会话详情</h2>
            <p id="session-status" class="status-text">正在加载会话...</p>
          </div>
          <div id="session-shell"></div>
        </section>
      </main>
    </div>

    <script type="module" src="/prechat-session.js"></script>
  </body>
</html>
